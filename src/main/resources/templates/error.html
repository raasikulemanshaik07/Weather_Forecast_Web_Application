<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error — Weather Forecast</title>
    <meta name="description" content="Something went wrong. Return to the Weather Forecast homepage.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">

        
        <header class="app-header">
            <div class="logo">
                <span class="logo-icon">🌤️</span>
                <h1>Weather Forecast</h1>
            </div>
        </header>

        
        <div class="error-page">
            <div class="error-icon-large">🌧️</div>
            <h2>Oops! Something went wrong</h2>
            <p class="error-text" th:text="${error}">An unexpected error occurred.</p>
            <a th:href="@{/}" class="back-btn">← Back to Home</a>
        </div>

        
        <footer class="app-footer">
            <p>Powered by <a href="https://openweathermap.org" target="_blank" rel="noopener">OpenWeatherMap</a></p>
        </footer>

    </div>
</body>
</html>
